name: Spring Boot CI/CD

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "SpringBoot/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "SpringBoot/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build with Gradle
        working-directory: SpringBoot/ControlPlaneService
        run: ./gradlew build

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: SpringBoot/ControlPlaneService/build/libs/*.jar

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: SpringBoot/ControlPlaneService/build/libs/

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        working-directory: SpringBoot/ControlPlaneService
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tempolink-server:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/tempolink-server:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tempolink-server:latest
            docker stop tempolink-server || true
            docker rm tempolink-server || true

            # GitHub Secrets를 사용해 서버에 .env.server 파일 생성
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > .env.server
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env.server

            # --env-file 옵션으로 환경변수 주입하여 컨테이너 실행
            # Nginx 연동을 위해 SERVER_FORWARD-HEADERS-STRATEGY=native 추가
            docker run -d -p 8080:8080 --name tempolink-server \
              -v /home/${{ secrets.SERVER_USER }}/downloads:/app/downloads \
              --env-file .env.server \
              -e SERVER_FORWARD-HEADERS-STRATEGY=native \
              ${{ secrets.DOCKER_USERNAME }}/tempolink-server:latest
