name: C++ Client Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload installers to deployment server"
        required: false
        default: false
        type: boolean
      version:
        description: "Manual version label (optional, e.g. v0.2.0-rc1)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: cpp-client-release-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_TRIPLET: x64-windows

jobs:
  metadata:
    name: release-metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"

  deps-windows:
    name: release-deps (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Windows vcpkg
        uses: ./.github/actions/setup-windows-vcpkg
        with:
          triplet: ${{ env.VCPKG_TRIPLET }}

      - name: Install manifest dependencies (Windows)
        shell: pwsh
        run: |
          $vcpkgExe = Join-Path "$PWD\.vcpkg" "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            throw "vcpkg.exe not found: $vcpkgExe"
          }
          & $vcpkgExe install --triplet "${{ env.VCPKG_TRIPLET }}" --x-manifest-root "$PWD"

  build:
    name: release-build (${{ matrix.os }})
    needs: [metadata, deps-windows]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps/*-src
          key: fetchcontent-src-v2-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-v2-
          enableCrossOsArchive: true

      - name: Cache sccache binary
        if: runner.os != 'Windows'
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache
        if: runner.os != 'Windows' && steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-aarch64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            else
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components 1 -C sccache-bin
          fi

      - name: Setup sccache environment (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_PATH=${{ github.workspace }}/sccache-bin/sccache" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/sccache-bin" >> "$GITHUB_PATH"
          echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"

      - name: Cache sccache artifacts
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'Cpp/Client/JuceApp/CMakeLists.txt', 'Cpp/Client/RealtimeCore/CMakeLists.txt', 'Cpp/Client/JuceApp/cmake/TempolinkCommon.cmake') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Setup Windows sccache
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-sccache
        with:
          version: "0.14.0"
          cache-key: ${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'Cpp/Client/JuceApp/CMakeLists.txt', 'Cpp/Client/RealtimeCore/CMakeLists.txt', 'Cpp/Client/JuceApp/cmake/TempolinkCommon.cmake') }}

      - name: Setup Windows vcpkg
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-vcpkg
        with:
          triplet: ${{ env.VCPKG_TRIPLET }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Start sccache server
        if: runner.os != 'Windows'
        shell: bash
        run: sccache --start-server || true

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --fresh --preset juce-client-release-win `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH"

      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --preset juce-client-release \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_PATH" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_PATH"

      - name: Build C++ Client
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake --build --preset juce-client-release-win --config Release --parallel
          else
            cmake --build --preset juce-client-release --config Release --parallel
          fi

      - name: Smoke test install layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $StageDir = "$PWD\smoke-stage"
          cmake --install out/build/juce-client-release --prefix "$StageDir" --config Release
          $ExePath = Join-Path $StageDir "TempoLink JUCE Client.exe"
          if (-not (Test-Path $ExePath)) {
            throw "Expected installed executable was not found: $ExePath"
          }

      - name: Smoke test install layout (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-release --prefix "$STAGE_DIR"
          if [ "$RUNNER_OS" = "macOS" ]; then
            test -d "$STAGE_DIR/TempoLink JUCE Client.app"
          else
            test -f "$STAGE_DIR/bin/TempoLink JUCE Client"
          fi

      - name: Setup Windows code signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TEMPOLINK_WIN_CODESIGN_PFX_B64: ${{ secrets.TEMPOLINK_WIN_CODESIGN_PFX_B64 }}
          WINDOWS_CODESIGN_PFX_B64: ${{ secrets.WINDOWS_CODESIGN_PFX_B64 }}
          WIN_CODESIGN_CERT_B64: ${{ secrets.WIN_CODESIGN_CERT_B64 }}
          TEMPOLINK_WIN_CODESIGN_PFX_PASSWORD: ${{ secrets.TEMPOLINK_WIN_CODESIGN_PFX_PASSWORD }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
          WIN_CODESIGN_CERT_PASSWORD: ${{ secrets.WIN_CODESIGN_CERT_PASSWORD }}
          WIN_CODESIGN_TIMESTAMP_URL_VAR: ${{ vars.WIN_CODESIGN_TIMESTAMP_URL }}
        run: |
          $pfxBase64 = @(
            $env:TEMPOLINK_WIN_CODESIGN_PFX_B64,
            $env:WINDOWS_CODESIGN_PFX_B64,
            $env:WIN_CODESIGN_CERT_B64
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1

          $pfxPassword = @(
            $env:TEMPOLINK_WIN_CODESIGN_PFX_PASSWORD,
            $env:WINDOWS_CODESIGN_PFX_PASSWORD,
            $env:WIN_CODESIGN_CERT_PASSWORD
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($pfxBase64) -or [string]::IsNullOrWhiteSpace($pfxPassword)) {
            Write-Host "Windows code-signing cert/password not configured. Skipping signing." -ForegroundColor Yellow
            "TEMPOLINK_CODESIGN_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "tempolink-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($pfxBase64))
          if (-not (Test-Path $certPath)) {
            throw "Failed to materialize code-signing certificate: $certPath"
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WIN_CODESIGN_TIMESTAMP_URL_VAR)) {
            "http://timestamp.digicert.com"
          } else {
            $env:WIN_CODESIGN_TIMESTAMP_URL_VAR
          }

          "TEMPOLINK_CODESIGN_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TEMPOLINK_CODESIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TEMPOLINK_CODESIGN_CERT_PASSWORD=$pfxPassword" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TEMPOLINK_CODESIGN_TIMESTAMP_URL=$timestampUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Materialize .env.deploy from GitHub Variables/Secrets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TEMPOLINK_ENV_DEPLOY_SECRET: ${{ secrets.TEMPOLINK_ENV_DEPLOY }}
          TEMPOLINK_ENV_DEPLOY_VAR: ${{ vars.TEMPOLINK_ENV_DEPLOY }}
          ENV_DEPLOY_SECRET: ${{ secrets.ENV_DEPLOY }}
          ENV_DEPLOY_VAR: ${{ vars.ENV_DEPLOY }}
        run: |
          $content = @(
            $env:TEMPOLINK_ENV_DEPLOY_SECRET,
            $env:TEMPOLINK_ENV_DEPLOY_VAR,
            $env:ENV_DEPLOY_SECRET,
            $env:ENV_DEPLOY_VAR
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($content)) {
            Write-Host "No GitHub variable/secret for .env.deploy found. Packaging will continue without it." -ForegroundColor Yellow
            exit 0
          }

          Set-Content -Path "$PWD\.env.deploy" -Value $content -Encoding utf8
          Write-Host ".env.deploy generated from GitHub variable/secret." -ForegroundColor Green

      - name: Package Windows (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Resolve-SignTool {
            $cmd = Get-Command signtool.exe -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Source }
            $candidates = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
              Sort-Object FullName -Descending
            if ($candidates.Count -gt 0) { return $candidates[0].FullName }
            return $null
          }

          function Sign-FileIfEnabled([string]$filePath) {
            if ($env:TEMPOLINK_CODESIGN_ENABLED -ne "true") { return }
            if (-not (Test-Path $filePath)) { throw "File to sign not found: $filePath" }
            $signtool = Resolve-SignTool
            if (-not $signtool) { throw "signtool.exe not found on runner." }
            & $signtool sign /fd SHA256 /td SHA256 /tr "$env:TEMPOLINK_CODESIGN_TIMESTAMP_URL" /f "$env:TEMPOLINK_CODESIGN_CERT_PATH" /p "$env:TEMPOLINK_CODESIGN_CERT_PASSWORD" "$filePath"
            if ($LASTEXITCODE -ne 0) {
              throw "Code signing failed for: $filePath"
            }
          }

          $ISCC = Get-Command iscc -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ISCC) { $ISCC = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" }
          $StagingDir = "$PWD\staging-win"
          $OutDir = "$PWD\installer-output"
          $IssPath = "$PWD\scripts\packaging\TempoLink.iss"
          if (-not (Test-Path $IssPath)) { throw "Inno script not found: $IssPath" }
          cmake --install out/build/juce-client-release --prefix "$StagingDir" --config Release
          if (Test-Path "$PWD\.env.deploy") {
            Copy-Item "$PWD\.env.deploy" "$StagingDir\.env.deploy" -Force
          } else {
            Write-Host ".env.deploy not found. Continuing without deploy env file." -ForegroundColor Yellow
          }
          Sign-FileIfEnabled (Join-Path $StagingDir "TempoLink JUCE Client.exe")
          & $ISCC "/O$OutDir" "/DAppDir=$StagingDir" "/DExeName=TempoLink JUCE Client.exe" $IssPath
          Sign-FileIfEnabled (Join-Path $OutDir "TempoLink-Installer.exe")

      - name: Verify Windows signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:TEMPOLINK_CODESIGN_ENABLED -ne "true") {
            Write-Host "Code signing disabled. Skipping signature verification." -ForegroundColor Yellow
            exit 0
          }
          $targets = @(
            "$PWD\staging-win\TempoLink JUCE Client.exe",
            "$PWD\installer-output\TempoLink-Installer.exe"
          )
          foreach ($target in $targets) {
            if (-not (Test-Path $target)) { throw "Missing signed target: $target" }
            $sig = Get-AuthenticodeSignature $target
            if ($sig.Status -ne "Valid") {
              throw "Invalid code signature ($($sig.Status)) for $target"
            }
            Write-Host "Signature valid: $target"
          }

      - name: Package (CPack)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd out/build/juce-client-release
          cpack -C Release

      - name: Organize Artifacts with checksums
        shell: bash
        run: |
          VERSION="${{ needs.metadata.outputs.release_version }}"
          DEST_DIR="final-artifacts/${VERSION}/${RUNNER_OS}"
          mkdir -p "$DEST_DIR"

          if [ "$RUNNER_OS" = "Windows" ]; then
            ARTIFACT_PATH="installer-output/TempoLink-Installer.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ARTIFACT_PATH="out/build/juce-client-release/TempoLink-Installer.pkg"
          else
            ARTIFACT_PATH="out/build/juce-client-release/TempoLink-Installer.deb"
          fi

          test -f "$ARTIFACT_PATH"
          cp "$ARTIFACT_PATH" "$DEST_DIR/"

          FILE_NAME="$(basename "$ARTIFACT_PATH")"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$DEST_DIR" && sha256sum "$FILE_NAME" > "${FILE_NAME}.sha256")
          else
            (cd "$DEST_DIR" && shasum -a 256 "$FILE_NAME" > "${FILE_NAME}.sha256")
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-installer-${{ matrix.os }}
          path: final-artifacts/${{ needs.metadata.outputs.release_version }}/**

  deploy:
    name: release-deploy
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
          merge-multiple: true

      - name: Prepare installer payload
        shell: bash
        run: |
          VERSION="${{ needs.metadata.outputs.release_version }}"
          DEST_DIR="deploy-payload/installer"
          mkdir -p "$DEST_DIR"

          find all-artifacts -type f \( -name "*.exe" -o -name "*.pkg" -o -name "*.deb" -o -name "*.sha256" \) \
            -print -exec cp "{}" "$DEST_DIR/" \;

          COUNT=$(find "$DEST_DIR" -type f | wc -l | tr -d ' ')
          if [ "$COUNT" = "0" ]; then
            echo "No deployable files were found in downloaded artifacts." >&2
            find all-artifacts -maxdepth 5 -print
            exit 1
          fi

      - name: Collect and Transfer Installers
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy-payload/installer/*"
          target: "/home/${{ secrets.SERVER_USER }}/downloads/${{ needs.metadata.outputs.release_version }}/installer"
          strip_components: 2
          overwrite: false
