name: C++ Client Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload installers to deployment server"
        required: false
        default: false
        type: boolean
      version:
        description: "Manual version label (optional, e.g. v0.2.0-rc1)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: cpp-client-release-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_REF: "2026.03.18"
  VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
  VCPKG_TRIPLET: x64-windows
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg/archives

jobs:
  metadata:
    name: release-metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: release-build (${{ matrix.os }})
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps
          key: fetchcontent-src-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-
          enableCrossOsArchive: true

      - name: Cache sccache binary
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache
        if: steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-aarch64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            else
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components 1 -C sccache-bin
          elif [ "$RUNNER_OS" = "Windows" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz | tar xz --strip-components 1 -C sccache-bin
          fi

      - name: Setup sccache environment (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_PATH=${{ github.workspace }}/sccache-bin/sccache" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/sccache-bin" >> "$GITHUB_PATH"
          echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"

      - name: Setup sccache environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $SccacheBin = "${{ github.workspace }}\sccache-bin"
          $SCCACHE = (Resolve-Path "$SccacheBin\sccache.exe").Path
          if (-not (Test-Path $SCCACHE)) { throw "sccache.exe not found at $SCCACHE" }
          & $SCCACHE --version
          "SCCACHE_PATH=$SCCACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$SccacheBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SCCACHE_DIR=${{ github.workspace }}\.sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache sccache artifacts
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'Cpp/Client/JuceApp/CMakeLists.txt', 'Cpp/Client/RealtimeCore/CMakeLists.txt', 'Cpp/Shared/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Cache vcpkg artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.vcpkg/installed
            ${{ github.workspace }}/.vcpkg/packages
            ${{ github.workspace }}/.vcpkg/downloads
            ${{ github.workspace }}/.vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-openssl-v1
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = "$env:GITHUB_WORKSPACE\.vcpkg"
          if (-not (Test-Path "$root\.git")) {
            git clone https://github.com/microsoft/vcpkg.git $root
          }
          git -C $root fetch --tags --force
          git -C $root checkout "refs/tags/${{ env.VCPKG_REF }}"
          $binaryCache = Join-Path $root "archives"
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$root\bootstrap-vcpkg.bat" -disableMetrics
          $rootUnix = $root -replace '\\','/'
          "TEMPOLINK_VCPKG_ROOT=$rootUnix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgExe = Join-Path $env:TEMPOLINK_VCPKG_ROOT "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            throw "vcpkg.exe not found: $vcpkgExe"
          }
          & $vcpkgExe install openssl:${{ env.VCPKG_TRIPLET }} --triplet ${{ env.VCPKG_TRIPLET }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Start sccache server
        shell: bash
        run: sccache --start-server || true

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --preset juce-client-release `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:TEMPOLINK_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }}" `
            "-DOPENSSL_ROOT_DIR=$env:TEMPOLINK_VCPKG_ROOT/installed/${{ env.VCPKG_TRIPLET }}"

      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          fi
          cmake --preset juce-client-release \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_PATH" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_PATH"

      - name: Build C++ Client
        run: cmake --build --preset juce-client-release --config Release --parallel

      - name: Smoke test install layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $StageDir = "$PWD\smoke-stage"
          cmake --install out/build/juce-client-release --prefix "$StageDir" --config Release
          $ExePath = Join-Path $StageDir "TempoLink JUCE Client.exe"
          if (-not (Test-Path $ExePath)) {
            throw "Expected installed executable was not found: $ExePath"
          }
          $sslDll = Get-ChildItem -Path $StageDir -Filter "libssl*.dll" -File -ErrorAction SilentlyContinue
          $cryptoDll = Get-ChildItem -Path $StageDir -Filter "libcrypto*.dll" -File -ErrorAction SilentlyContinue
          if (-not $sslDll -or -not $cryptoDll) {
            throw "Expected OpenSSL runtime DLLs are missing in smoke-stage."
          }

      - name: Smoke test install layout (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-release --prefix "$STAGE_DIR"
          if [ "$RUNNER_OS" = "macOS" ]; then
            test -d "$STAGE_DIR/TempoLink JUCE Client.app"
          else
            test -f "$STAGE_DIR/bin/TempoLink JUCE Client"
          fi

      - name: Package Windows (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ISCC = Get-Command iscc -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ISCC) { $ISCC = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" }
          $StagingDir = "$PWD\staging-win"
          $OutDir = "$PWD\installer-output"
          $IssPath = "$PWD\scripts\packaging\TempoLink.iss"
          if (-not (Test-Path $IssPath)) { throw "Inno script not found: $IssPath" }
          if (-not (Test-Path "$PWD\.env.deploy")) { throw ".env.deploy is required for packaging." }
          cmake --install out/build/juce-client-release --prefix "$StagingDir" --config Release
          Copy-Item "$PWD\.env.deploy" "$StagingDir\.env.deploy" -Force
          & $ISCC "/O$OutDir" "/DAppDir=$StagingDir" "/DExeName=TempoLink JUCE Client.exe" $IssPath

      - name: Package (CPack)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd out/build/juce-client-release
          cpack -C Release

      - name: Organize Artifacts with checksums
        shell: bash
        run: |
          VERSION="${{ needs.metadata.outputs.release_version }}"
          DEST_DIR="final-artifacts/${VERSION}/${RUNNER_OS}"
          mkdir -p "$DEST_DIR"

          if [ "$RUNNER_OS" = "Windows" ]; then
            ARTIFACT_PATH="installer-output/TempoLink-Installer.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ARTIFACT_PATH="out/build/juce-client-release/TempoLink-Installer.pkg"
          else
            ARTIFACT_PATH="out/build/juce-client-release/TempoLink-Installer.deb"
          fi

          test -f "$ARTIFACT_PATH"
          cp "$ARTIFACT_PATH" "$DEST_DIR/"

          FILE_NAME="$(basename "$ARTIFACT_PATH")"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$DEST_DIR" && sha256sum "$FILE_NAME" > "${FILE_NAME}.sha256")
          else
            (cd "$DEST_DIR" && shasum -a 256 "$FILE_NAME" > "${FILE_NAME}.sha256")
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-installer-${{ matrix.os }}
          path: final-artifacts/${{ needs.metadata.outputs.release_version }}/**

  deploy:
    name: release-deploy
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Collect and Transfer Installers
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "all-artifacts/**/${{ needs.metadata.outputs.release_version }}/**"
          target: "/home/${{ secrets.SERVER_USER }}/downloads/${{ needs.metadata.outputs.release_version }}"
          overwrite: false
