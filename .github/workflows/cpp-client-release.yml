name: C++ Client Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache vcpkg OpenSSL (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
            D:/vcpkg/installed
            D:/vcpkg/packages
          key: vcpkg-openssl-${{ runner.os }}-x64-windows-v1
          restore-keys: |
            vcpkg-openssl-${{ runner.os }}-x64-windows-

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          system_drive="${SYSTEMDRIVE:-${SystemDrive:-C:}}"
          if [[ -n "${VCPKG_ROOT:-}" && -x "${VCPKG_ROOT//\\//}/vcpkg.exe" ]]; then
            root="${VCPKG_ROOT//\\//}"
          elif [[ -n "${VCPKG_INSTALLATION_ROOT:-}" && -x "${VCPKG_INSTALLATION_ROOT//\\//}/vcpkg.exe" ]]; then
            root="${VCPKG_INSTALLATION_ROOT//\\//}"
          elif [[ -x "${system_drive}/vcpkg/vcpkg.exe" ]]; then
            root="${system_drive}/vcpkg"
          else
            where.exe vcpkg || true
            echo "vcpkg.exe not found on runner" >&2
            exit 1
          fi
          echo "TEMPOLINK_VCPKG_ROOT=${root}" >> "$GITHUB_ENV"
          "${root}/vcpkg.exe" install openssl:x64-windows --triplet x64-windows

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE deps
        uses: actions/cache@v4
        with:
          path: |
            .cmake_deps/juce-src
          key: juce-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            juce-deps-${{ runner.os }}-

      - name: Cache sccache binary
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache
        if: steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-aarch64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            else
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components 1 -C sccache-bin
          elif [ "$RUNNER_OS" = "Windows" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz | tar xz --strip-components 1 -C sccache-bin
          fi

      - name: Setup sccache environment (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_PATH=${{ github.workspace }}/sccache-bin/sccache" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/sccache-bin" >> "$GITHUB_PATH"
          echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"

      - name: Verify and Setup sccache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $SccacheBin = "${{ github.workspace }}\sccache-bin"
          $SCCACHE = (Resolve-Path "$SccacheBin\sccache.exe").Path
          if (-not (Test-Path $SCCACHE)) { throw "sccache.exe not found at $SCCACHE" }
          & $SCCACHE --version
          "SCCACHE_PATH=$SCCACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$SccacheBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SCCACHE_DIR=${{ github.workspace }}\.sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache sccache artifacts
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Start sccache server
        shell: bash
        run: sccache --start-server || true

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --preset juce-client-release `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:TEMPOLINK_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows" `
            "-DOPENSSL_ROOT_DIR=$env:TEMPOLINK_VCPKG_ROOT/installed/x64-windows"

      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          fi
          cmake --preset juce-client-release \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_PATH" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_PATH"

      - name: Build C++ Client
        run: cmake --build --preset juce-client-release --config Release --parallel

      - name: Create .env.deploy
        shell: bash
        run: |
          echo "TEMPOLINK_CONTROL_PLANE_BASE_URL=${{ secrets.TEMPOLINK_CONTROL_PLANE_BASE_URL }}" > .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_HOST=${{ secrets.TEMPOLINK_CONTROL_PLANE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_PORT=${{ secrets.TEMPOLINK_CONTROL_PLANE_PORT }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_HOST=${{ secrets.TEMPOLINK_DEFAULT_RELAY_HOST }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_PORT=${{ secrets.TEMPOLINK_DEFAULT_RELAY_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_HOST=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_HOST }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PORT=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PATH=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PATH }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_HOST=${{ secrets.TEMPOLINK_BRIDGE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT }}" >> .env.deploy

      - name: Package Windows (Inno Setup)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ISCC = Get-Command iscc -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ISCC) { $ISCC = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" }
          $StagingDir = "$PWD\staging-win"
          $OutDir = "$PWD\installer-output"
          cmake --install out/build/juce-client-release --prefix "$StagingDir" --config Release
          Copy-Item "$PWD\.env.deploy" "$StagingDir\.env.deploy" -Force
          & $ISCC "/O$OutDir" "/DAppDir=$StagingDir" "/DExeName=TempoLink JUCE Client.exe" "Cpp\Client\Installer\TempoLink.iss"

      - name: Package (CPack)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd out/build/juce-client-release
          cpack -C Release

      - name: Organize Artifacts
        shell: bash
        run: |
          mkdir -p final-artifacts
          if [ "$RUNNER_OS" = "Windows" ]; then find installer-output -type f -name "*.exe" -exec cp {} final-artifacts/ \;
          elif [ "$RUNNER_OS" = "macOS" ]; then find . -type f -name "TempoLink-Installer.pkg" -exec cp {} final-artifacts/ \;
          elif [ "$RUNNER_OS" = "Linux" ]; then find . -type f -name "TempoLink-Installer.deb" -exec cp {} final-artifacts/ \;
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-installer-${{ matrix.os }}
          path: final-artifacts/*

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Collect and Transfer Installers
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "all-artifacts/**/TempoLink-Installer.*"
          target: "/home/${{ secrets.SERVER_USER }}/downloads"
          strip_components: 2
