name: C++ Client CI/CD

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "Cpp/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "Cpp/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure CMake
        run: cmake --preset juce-client-debug

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug

      - name: Create .env.deploy from Secrets
        run: |
          echo "TEMPOLINK_CONTROL_PLANE_BASE_URL=${{ secrets.TEMPOLINK_CONTROL_PLANE_BASE_URL }}" > .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_HOST=${{ secrets.TEMPOLINK_CONTROL_PLANE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_PORT=${{ secrets.TEMPOLINK_CONTROL_PLANE_PORT }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_HOST=${{ secrets.TEMPOLINK_DEFAULT_RELAY_HOST }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_PORT=${{ secrets.TEMPOLINK_DEFAULT_RELAY_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_HOST=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_HOST }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PORT=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PATH=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PATH }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_HOST=${{ secrets.TEMPOLINK_BRIDGE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT }}" >> .env.deploy

      - name: Build Installer (Inno Setup)
        run: |
          $ExePath = Get-ChildItem -Path "out/build/juce-client-debug" -Filter *tempolink_juce_client.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DSourceExe=$ExePath" "/DSourceEnv=$PWD\.env.deploy" "Cpp\Client\Installer\TempoLink.iss"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-client-binary
          path: "Output/TempoLink-Installer.exe"

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release 생성을 위한 권한 부여
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: windows-client-binary
          path: release-artifacts/

      - name: Create Target Directory on Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p /home/${{ secrets.SERVER_USER }}/downloads

      - name: SCP Transfer to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release-artifacts/*"
          target: "/home/${{ secrets.SERVER_USER }}/downloads"
          strip_components: 1
