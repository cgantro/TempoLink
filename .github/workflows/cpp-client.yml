name: C++ Client CI/CD

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "Cpp/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/**"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "Cpp/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache sccache binary
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache
        if: steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          if [ "$RUNNER_OS" == "Windows" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz | tar xz --strip-components 1 -C sccache-bin
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-aarch64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            else
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            fi
          elif [ "$RUNNER_OS" == "Linux" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components 1 -C sccache-bin
          fi

      - name: Setup sccache environment
        run: |
          echo "$(pwd)/sccache-bin" >> $GITHUB_PATH
          echo "SCCACHE_DIR=$(pwd)/.sccache" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=false" >> $GITHUB_ENV
        shell: bash

      - name: Cache sccache artifacts
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-data-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            sccache-data-${{ runner.os }}-

      - name: Start sccache server
        run: sccache --start-server
        shell: bash

      - name: Configure CMake
        run: |
          cmake --preset juce-client-debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache
        shell: bash

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug --parallel

      - name: Create .env.deploy
        run: |
          echo "TEMPOLINK_CONTROL_PLANE_BASE_URL=${{ secrets.TEMPOLINK_CONTROL_PLANE_BASE_URL }}" > .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_HOST=${{ secrets.TEMPOLINK_CONTROL_PLANE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_CONTROL_PLANE_PORT=${{ secrets.TEMPOLINK_CONTROL_PLANE_PORT }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_HOST=${{ secrets.TEMPOLINK_DEFAULT_RELAY_HOST }}" >> .env.deploy
          echo "TEMPOLINK_DEFAULT_RELAY_PORT=${{ secrets.TEMPOLINK_DEFAULT_RELAY_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_HOST=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_HOST }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PORT=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PORT }}" >> .env.deploy
          echo "TEMPOLINK_OAUTH_CALLBACK_PATH=${{ secrets.TEMPOLINK_OAUTH_CALLBACK_PATH }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_HOST=${{ secrets.TEMPOLINK_BRIDGE_HOST }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_CLIENT_LISTEN_PORT }}" >> .env.deploy
          echo "TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT=${{ secrets.TEMPOLINK_BRIDGE_PLUGIN_LISTEN_PORT }}" >> .env.deploy
        shell: bash

      - name: Package Windows (Inno Setup)
        if: runner.os == 'Windows'
        run: |
          # Use system environment variables instead of absolute strings
          $ISCC = Get-Command iscc -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ISCC) {
            $ISCC = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
          }
          
          # Use relative paths for discovery and execution
          $ExePath = Get-ChildItem -Path "out/build" -Filter "tempolink_juce_client.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $ExePath) {
            Write-Error "Could not find tempolink_juce_client.exe for packaging."
            exit 1
          }

          & $ISCC "/DSourceExe=$ExePath" "/DSourceEnv=./.env.deploy" "Cpp/Client/Installer/TempoLink.iss"
        shell: powershell

      - name: Package (CPack)
        if: runner.os != 'Windows'
        run: |
          cd out/build/juce-client-debug
          cpack -C Debug
        shell: bash

      - name: Organize Artifacts
        run: |
          mkdir -p final-artifacts
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp Output/TempoLink-Installer.exe final-artifacts/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cp out/build/juce-client-debug/TempoLink-Installer.pkg final-artifacts/
          elif [ "$RUNNER_OS" == "Linux" ]; then
            cp out/build/juce-client-debug/TempoLink-Installer.deb final-artifacts/
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-installer-${{ matrix.os }}
          path: final-artifacts/*

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Collect Installers
        run: |
          mkdir -p release-artifacts
          find all-artifacts/ -type f -name "TempoLink-Installer.*" -exec cp {} release-artifacts/ \;
        shell: bash

      - name: Sync to Download Hub
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.SERVER_USER }}/downloads
            # Wait for file transfers (handled by SCP next)

      - name: SCP Transfer
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release-artifacts/*"
          target: "/home/${{ secrets.SERVER_USER }}/downloads"
          strip_components: 1
