name: C++ Client PR Check

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: cpp-client-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VCPKG_TRIPLET: x64-windows

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      run_fast: ${{ steps.filter.outputs.run_fast }}
      run_macos_full: ${{ steps.filter.outputs.run_macos_full }}
    steps:
      - name: Detect changed file groups
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_fast:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.editorconfig'
              - '!.gitattributes'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE*'
            run_macos_full:
              - 'Cpp/**/*.m'
              - 'Cpp/**/*.mm'
              - 'Cpp/**/*mac*'
              - 'Cpp/**/*Mac*'
              - 'Cpp/Client/JuceApp/CMakeLists.txt'
              - 'CMakeLists.txt'

  docs-or-meta-lane:
    name: docs-meta-lane
    needs: changes
    if: needs.changes.outputs.run_fast != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip heavy CI for docs/meta-only changes
        run: echo "Docs/meta-only PR detected. Heavy build lanes are skipped."

  fast-lane-core:
    name: fast-lane-core (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.run_fast == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps/*-src
          key: fetchcontent-src-v2-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-v2-
          enableCrossOsArchive: true

      - name: Setup Windows sccache
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-sccache
        with:
          version: "0.14.0"
          cache-key: ${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'Cpp/Client/JuceApp/CMakeLists.txt', 'Cpp/Client/RealtimeCore/CMakeLists.txt', 'Cpp/Client/JuceApp/cmake/TempolinkCommon.cmake') }}

      - name: Setup Windows vcpkg
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-vcpkg
        with:
          triplet: ${{ env.VCPKG_TRIPLET }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --fresh --preset juce-client-debug-win `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH"

      - name: Configure CMake (Ubuntu)
        if: runner.os == 'Linux'
        uses: ./.github/actions/configure-build-ubuntu
        with:
          preset: juce-client-debug

      - name: Build C++ Client (Windows)
        if: runner.os == 'Windows'
        run: cmake --build --preset juce-client-debug-win --parallel

      - name: Smoke test install layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $StageDir = "$PWD\smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$StageDir" --config Debug
          $ExePath = Join-Path $StageDir "TempoLink JUCE Client.exe"
          if (-not (Test-Path $ExePath)) {
            throw "Expected installed executable was not found: $ExePath"
          }

      - name: Smoke test install layout (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$STAGE_DIR"
          test -f "$STAGE_DIR/bin/TempoLink JUCE Client"

      - name: Show sccache stats (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sccache --show-stats || true

  fast-lane-macos:
    name: fast-lane-macos
    needs: changes
    if: needs.changes.outputs.run_fast == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install macOS Dependencies
        run: brew install openssl@3

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps/*-src
          key: fetchcontent-src-v2-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-v2-
          enableCrossOsArchive: true

      - name: Configure CMake (macOS)
        uses: ./.github/actions/configure-build-macos
        with:
          preset: juce-client-debug

      - name: Light verification (macOS app bundle exists)
        shell: bash
        run: |
          APP_PATH="$(find out/build/juce-client-debug -type d -name 'TempoLink JUCE Client.app' | head -n 1)"
          test -n "$APP_PATH"

      - name: Full smoke test install layout (macOS)
        if: needs.changes.outputs.run_macos_full == 'true'
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$STAGE_DIR"
          test -d "$STAGE_DIR/TempoLink JUCE Client.app"
