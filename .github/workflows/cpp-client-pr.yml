name: C++ Client PR Check

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: cpp-client-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VCPKG_REF: "2026.03.18"
  VCPKG_TRIPLET: x64-windows

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      run_fast: ${{ steps.filter.outputs.run_fast }}
      run_macos_full: ${{ steps.filter.outputs.run_macos_full }}
    steps:
      - name: Detect changed file groups
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_fast:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.editorconfig'
              - '!.gitattributes'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE*'
            run_macos_full:
              - 'Cpp/**/*.m'
              - 'Cpp/**/*.mm'
              - 'Cpp/**/*mac*'
              - 'Cpp/**/*Mac*'
              - 'Cpp/Client/JuceApp/CMakeLists.txt'
              - 'CMakeLists.txt'

  docs-or-meta-lane:
    name: docs-meta-lane
    needs: changes
    if: needs.changes.outputs.run_fast != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip heavy CI for docs/meta-only changes
        run: echo "Docs/meta-only PR detected. Heavy build lanes are skipped."

  fast-lane-core:
    name: fast-lane-core (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.run_fast == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps
          key: fetchcontent-src-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-
          enableCrossOsArchive: true

      - name: Cache sccache binary (Windows)
        if: runner.os == 'Windows'
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache (Windows)
        if: runner.os == 'Windows' && steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz | tar xz --strip-components 1 -C sccache-bin

      - name: Setup sccache environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $SccacheBin = "${{ github.workspace }}\sccache-bin"
          $SCCACHE = (Resolve-Path "$SccacheBin\sccache.exe").Path
          if (-not (Test-Path $SCCACHE)) { throw "sccache.exe not found at $SCCACHE" }
          & $SCCACHE --version
          "SCCACHE_PATH=$SCCACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$SccacheBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SCCACHE_DIR=${{ github.workspace }}\.sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache sccache artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'Cpp/Client/JuceApp/CMakeLists.txt', 'Cpp/Client/RealtimeCore/CMakeLists.txt', 'Cpp/Shared/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Cache vcpkg artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.vcpkg/installed
            ${{ github.workspace }}/.vcpkg/packages
            ${{ github.workspace }}/.vcpkg/downloads
            ${{ github.workspace }}/.vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-openssl-v1
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = "$env:GITHUB_WORKSPACE\.vcpkg"
          if (-not (Test-Path "$root\.git")) {
            git clone https://github.com/microsoft/vcpkg.git $root
          }
          git -C $root fetch --tags --force
          git -C $root checkout "refs/tags/${{ env.VCPKG_REF }}"
          $binaryCache = Join-Path $root "archives"
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$root\bootstrap-vcpkg.bat" -disableMetrics
          $rootUnix = $root -replace '\\','/'
          "TEMPOLINK_VCPKG_ROOT=$rootUnix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgExe = Join-Path $env:TEMPOLINK_VCPKG_ROOT "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            throw "vcpkg.exe not found: $vcpkgExe"
          }
          & $vcpkgExe install openssl:${{ env.VCPKG_TRIPLET }} --triplet ${{ env.VCPKG_TRIPLET }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Start sccache server (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sccache --start-server || true

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --preset juce-client-debug `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:TEMPOLINK_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }}" `
            "-DOPENSSL_ROOT_DIR=$env:TEMPOLINK_VCPKG_ROOT/installed/${{ env.VCPKG_TRIPLET }}"

      - name: Configure CMake (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --preset juce-client-debug

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug --parallel

      - name: Smoke test install layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $StageDir = "$PWD\smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$StageDir" --config Debug
          $ExePath = Join-Path $StageDir "TempoLink JUCE Client.exe"
          if (-not (Test-Path $ExePath)) {
            throw "Expected installed executable was not found: $ExePath"
          }
          $sslDll = Get-ChildItem -Path $StageDir -Filter "libssl*.dll" -File -ErrorAction SilentlyContinue
          $cryptoDll = Get-ChildItem -Path $StageDir -Filter "libcrypto*.dll" -File -ErrorAction SilentlyContinue
          if (-not $sslDll -or -not $cryptoDll) {
            throw "Expected OpenSSL runtime DLLs are missing in smoke-stage."
          }

      - name: Smoke test install layout (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$STAGE_DIR"
          test -f "$STAGE_DIR/bin/TempoLink JUCE Client"

      - name: Show sccache stats (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sccache --show-stats || true

  fast-lane-macos-light:
    name: fast-lane-macos-light
    needs: changes
    if: needs.changes.outputs.run_fast == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install macOS Dependencies
        run: brew install openssl@3

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps
          key: fetchcontent-src-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-
          enableCrossOsArchive: true

      - name: Configure CMake (macOS)
        shell: bash
        run: |
          cmake --preset juce-client-debug \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug --parallel

      - name: Light verification (macOS app bundle exists)
        shell: bash
        run: |
          APP_PATH="$(find out/build/juce-client-debug -type d -name 'TempoLink JUCE Client.app' | head -n 1)"
          test -n "$APP_PATH"

  full-lane-macos-smoke:
    name: full-lane-macos-smoke
    needs: [changes, fast-lane-macos-light]
    if: needs.changes.outputs.run_fast == 'true' && needs.changes.outputs.run_macos_full == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install macOS Dependencies
        run: brew install openssl@3

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .cmake_deps
          key: fetchcontent-src-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-
          enableCrossOsArchive: true

      - name: Configure CMake (macOS)
        shell: bash
        run: |
          cmake --preset juce-client-debug \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug --parallel

      - name: Smoke test install layout (macOS full)
        shell: bash
        run: |
          STAGE_DIR="$PWD/smoke-stage"
          cmake --install out/build/juce-client-debug --prefix "$STAGE_DIR"
          test -d "$STAGE_DIR/TempoLink JUCE Client.app"
