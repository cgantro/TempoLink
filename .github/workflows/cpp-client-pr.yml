name: C++ Client PR Check

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

concurrency:
  group: cpp-client-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Ubuntu Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Cache vcpkg artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
            C:/vcpkg/downloads
            D:/vcpkg/installed
            D:/vcpkg/packages
            D:/vcpkg/downloads
            C:/Users/runneradmin/AppData/Local/vcpkg/archives
          key: vcpkg-openssl-x64-windows-2026.03.18-v4

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rootCandidates = @(
            $env:VCPKG_ROOT,
            $env:VCPKG_INSTALLATION_ROOT,
            (Join-Path ($env:SYSTEMDRIVE ?? "C:") "vcpkg")
          ) | Where-Object { $_ -and (Test-Path (Join-Path $_ "vcpkg.exe")) }

          if (-not $rootCandidates) {
            & where.exe vcpkg
            throw "vcpkg.exe not found on runner"
          }

          $root = ($rootCandidates[0] -replace '\\','/')
          "TEMPOLINK_VCPKG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $vcpkgExe = Join-Path $root "vcpkg.exe"
          $registryTag = "2026.03.18"
          if (Test-Path (Join-Path $root ".git")) {
            git -C $root fetch --depth 1 origin "refs/tags/$registryTag"
            git -C $root checkout --force FETCH_HEAD
          }
          $feedUrl = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          $nugetExe = (& $vcpkgExe fetch nuget | Select-Object -Last 1).Trim()

          & $nugetExe sources Remove -Name GitHubPackages 2>$null | Out-Null
          & $nugetExe sources Add `
            -Name GitHubPackages `
            -Source $feedUrl `
            -UserName "${{ github.repository_owner }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          & $nugetExe setapikey "${{ secrets.GITHUB_TOKEN }}" -Source $feedUrl

          $binarySources = "clear;nuget,$feedUrl,readwrite;default,readwrite"
          "VCPKG_BINARY_SOURCES=$binarySources" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:VCPKG_BINARY_SOURCES = $binarySources

          & $vcpkgExe install openssl:x64-windows --triplet x64-windows

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: |
            .cmake_deps
          key: fetchcontent-src-${{ hashFiles('CMakeLists.txt', 'Cpp/Client/JuceApp/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-src-
          enableCrossOsArchive: true

      - name: Cache juceaide (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            out/build/juce-client-debug/_deps/juce-build/extras/Build/juceaide
            out/build/juce-client-release/_deps/juce-build/extras/Build/juceaide
          key: juceaide-windows-msvc-v1

      - name: Cache sccache binary
        id: cache-sccache-bin
        uses: actions/cache@v4
        with:
          path: sccache-bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Download sccache
        if: steps.cache-sccache-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p sccache-bin
          if [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-aarch64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            else
              curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-apple-darwin.tar.gz | tar xz --strip-components 1 -C sccache-bin
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components 1 -C sccache-bin
          elif [ "$RUNNER_OS" = "Windows" ]; then
            curl -L https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz | tar xz --strip-components 1 -C sccache-bin
          fi

      - name: Setup sccache environment (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_PATH=${{ github.workspace }}/sccache-bin/sccache" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/sccache-bin" >> "$GITHUB_PATH"
          echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"

      - name: Verify and Setup sccache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $SccacheBin = "${{ github.workspace }}\sccache-bin"
          $SCCACHE = (Resolve-Path "$SccacheBin\sccache.exe").Path
          if (-not (Test-Path $SCCACHE)) { throw "sccache.exe not found at $SCCACHE" }
          & $SCCACHE --version
          "SCCACHE_PATH=$SCCACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$SccacheBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SCCACHE_DIR=${{ github.workspace }}\.sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache sccache artifacts
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Start sccache server
        shell: bash
        run: |
          sccache --start-server || true

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --preset juce-client-debug `
            "-DCMAKE_C_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_CXX_COMPILER_LAUNCHER=$env:SCCACHE_PATH" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:TEMPOLINK_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows" `
            "-DOPENSSL_ROOT_DIR=$env:TEMPOLINK_VCPKG_ROOT/installed/x64-windows"

      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          fi
          cmake --preset juce-client-debug \
            -DCMAKE_C_COMPILER_LAUNCHER="$SCCACHE_PATH" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$SCCACHE_PATH"

      - name: Build C++ Client
        run: cmake --build --preset juce-client-debug --parallel

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true
