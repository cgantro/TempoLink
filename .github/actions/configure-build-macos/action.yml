name: "Configure and Build macOS"
description: "Configure and build CMake preset on macOS"

inputs:
  preset:
    description: "CMake preset name"
    required: true
  configure-args:
    description: "Extra configure args"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure CMake (macOS)
      shell: bash
      run: |
        cmake --preset "${{ inputs.preset }}" ${{ inputs.configure-args }}

    - name: Build (macOS)
      shell: bash
      run: |
        cmake --build --preset "${{ inputs.preset }}" --parallel
