name: "Setup Windows vcpkg"
description: "Cache and bootstrap Windows vcpkg for manifest mode"

inputs:
  triplet:
    description: "vcpkg target triplet"
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache vcpkg artifacts
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/.vcpkg/installed
          ${{ github.workspace }}/.vcpkg/packages
          ${{ github.workspace }}/.vcpkg/downloads
          ${{ github.workspace }}/.vcpkg/archives
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-v1
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ inputs.triplet }}-

    - name: Bootstrap vcpkg from pinned baseline
      shell: pwsh
      run: |
        $manifestPath = Join-Path $env:GITHUB_WORKSPACE "vcpkg.json"
        if (-not (Test-Path $manifestPath)) {
          throw "vcpkg manifest not found: $manifestPath"
        }
        $configPath = Join-Path $env:GITHUB_WORKSPACE "vcpkg-configuration.json"
        if (-not (Test-Path $configPath)) {
          throw "vcpkg configuration not found: $configPath"
        }

        $config = Get-Content $configPath -Raw | ConvertFrom-Json
        $baseline = $config.'default-registry'.baseline
        if ([string]::IsNullOrWhiteSpace($baseline)) {
          throw "default-registry.baseline is missing in vcpkg-configuration.json"
        }

        $root = "$env:GITHUB_WORKSPACE\.vcpkg"
        if (-not (Test-Path "$root\.git")) {
          git clone --filter=blob:none --no-checkout https://github.com/microsoft/vcpkg.git $root
        }
        git -C $root fetch --depth 1 origin $baseline
        git -C $root checkout FETCH_HEAD

        $binaryCache = Join-Path $root "archives"
        New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null
        "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        & "$root\bootstrap-vcpkg.bat" -disableMetrics

        $rootUnix = $root -replace '\\','/'
        "TEMPOLINK_VCPKG_ROOT=$rootUnix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
