name: "Setup Windows sccache"
description: "Prepare sccache binary, cache directory, and start server on Windows"

inputs:
  version:
    description: "sccache version"
    required: false
    default: "0.14.0"
  cache-key:
    description: "Key suffix for sccache artifact cache"
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache sccache binary
      id: cache-sccache-bin
      uses: actions/cache@v4
      with:
        path: sccache-bin
        key: sccache-bin-${{ runner.os }}-v${{ inputs.version }}

    - name: Download sccache
      if: steps.cache-sccache-bin.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p sccache-bin
        curl -L "https://github.com/mozilla/sccache/releases/download/v${{ inputs.version }}/sccache-v${{ inputs.version }}-x86_64-pc-windows-msvc.tar.gz" | tar xz --strip-components 1 -C sccache-bin

    - name: Setup sccache environment
      shell: pwsh
      run: |
        $SccacheBin = "${{ github.workspace }}\sccache-bin"
        $SCCACHE = (Resolve-Path "$SccacheBin\sccache.exe").Path
        if (-not (Test-Path $SCCACHE)) { throw "sccache.exe not found at $SCCACHE" }
        & $SCCACHE --version
        "SCCACHE_PATH=$SCCACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "$SccacheBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "SCCACHE_DIR=${{ github.workspace }}\.sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "SCCACHE_GHA_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Cache sccache artifacts
      uses: actions/cache@v4
      with:
        path: .sccache
        key: sccache-${{ runner.os }}-${{ inputs.cache-key }}
        restore-keys: |
          sccache-${{ runner.os }}-

    - name: Start sccache server
      shell: bash
      run: sccache --start-server || true
